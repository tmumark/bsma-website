<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>聯絡我們｜建築物安全管理協會</title>
  <meta name="description" content="建築物安全管理協會聯絡方式、地址、服務時間與案件查詢說明。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" /></noscript>
  <link rel="icon" href="favicon.ico?v=20260624-logo" sizes="any" />
  <link rel="icon" type="image/png" href="assets/favicon.png?v=20260624-logo" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=20260624-logo" />
  <link rel="stylesheet" href="css/style.css?v=20260626-footer" />
</head>
<body data-page="contact">
  <div id="site-header"></div>

  <section class="page-banner">
    <div class="container">
      <div class="crumb"><a href="./">首頁</a> ／ 聯絡我們</div>
      <h1>聯絡我們</h1>
    </div>
  </section>

  <main class="section">
    <div class="container">
      <div class="contact-grid">
        <div class="card">
          <h2 style="color:var(--navy);margin-top:0">聯絡資訊</h2>
          <ul class="info-list">
            <li>
              <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span>
              <div><strong>會址</strong><span id="cAddr"></span></div>
            </li>
            <li>
              <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2z"/></svg></span>
              <div><strong>電話</strong><span id="cPhone"></span></div>
            </li>
            <li>
              <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V3h12v6"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v7H6z"/><path d="M17 12h.01"/></svg></span>
              <div><strong>傳真</strong><span id="cFax"></span></div>
            </li>
            <li>
              <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg></span>
              <div><strong>電子信箱</strong><span id="cEmail"></span></div>
            </li>
            <li>
              <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2" stroke-linecap="round"/></svg></span>
              <div><strong>服務時間</strong><span id="cHours"></span></div>
            </li>
          </ul>
          <p style="color:var(--text-soft);font-size:14px;margin-top:16px">案件進度問題，建議先使用<a href="search.html">案件查詢</a>頁面，如仍有疑問再於上班時間來電洽詢。</p>
        </div>

        <div class="card map-embed" style="padding:14px">
          <iframe
            title="本會位置"
            src="https://www.google.com/maps?q=台北市大同區長安西路62號8樓&output=embed"
            loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/config.js?v=20260624-contact"></script>
  <script src="js/main.js?v=20260626-footer"></script>
  <script>
    (function () {
      var c = (window.SITE_CONFIG || {}).contact || {};
      var set = function (id, v) { var el = document.getElementById(id); if (el) el.textContent = v || ""; };
      set("cAddr", c.address); set("cPhone", c.phone); set("cFax", c.fax); set("cEmail", c.email); set("cHours", c.hours);
    })();
  </script>
</body>
</html>
