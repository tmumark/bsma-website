<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>案件查詢｜建築物安全管理協會</title>
  <meta name="description" content="建築物安全管理協會建築物公共安全檢查申報案件查詢服務。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" /></noscript>
  <link rel="icon" href="favicon.ico?v=20260626-round-logo" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png?v=20260626-round-logo" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png?v=20260626-round-logo" />
  <link rel="icon" type="image/png" href="assets/favicon.png?v=20260626-round-logo" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=20260626-round-logo" />
  <link rel="stylesheet" href="css/style.css?v=20260626-remove-news" />
</head>
<body data-page="search">
  <div id="site-header"></div>

  <section class="page-banner">
    <div class="container">
      <div class="crumb"><a href="./">首頁</a> ／ 案件查詢</div>
      <h1>案件查詢</h1>
    </div>
  </section>

  <main class="section search-service-section">
    <div class="container">
      <div class="search-service-intro">
        <div>
          <span class="service-kicker">線上查詢服務</span>
          <h2>建築物公共安全申報案件查詢</h2>
          <p>本頁連接本會案件資料庫，請依本會提供之查詢資料完整輸入，以精確比對方式查詢案件狀態。</p>
        </div>
        <dl class="service-facts" aria-label="查詢服務資訊">
          <div>
            <dt>資料來源</dt>
            <dd>本會案件資料庫</dd>
          </div>
          <div>
            <dt>查詢方式</dt>
            <dd>完整條件比對</dd>
          </div>
          <div>
            <dt>服務時間</dt>
            <dd>線上查詢全天開放</dd>
          </div>
        </dl>
      </div>

      <!-- 查詢嵌入區 -->
      <section class="search-query-shell" aria-label="案件查詢表單">
        <div class="search-query-toolbar">
          <div>
            <span>案件資料庫</span>
            <strong>Ragic 精確查詢</strong>
          </div>
          <div id="modeBanner" class="search-status"></div>
        </div>

        <div class="ragic-embed" id="ragicEmbed">
          <div id="ragic_webview"></div>
          <noscript>Please enable JavaScript to view the <a href="https://www.ragic.com/?ref_noscript">Online database form by Ragic.</a></noscript>
          <a href="https://www.ragic.com" id="ragic-link">online database form by <span class="logo-ragic">Ragic</span></a>
        </div>
      </section>

      <section class="search-guidance" aria-label="查詢說明">
        <article>
          <span>01</span>
          <h3>完整填寫</h3>
          <p>請輸入完整案件識別資料或本會指定查詢欄位，以保障案件當事人個資。</p>
        </article>
        <article>
          <span>02</span>
          <h3>資料依據</h3>
          <p>查詢結果以本會實際案件紀錄與資料更新時間為準。</p>
        </article>
        <article>
          <span>03</span>
          <h3>協助服務</h3>
          <p>若查詢畫面未顯示或資料無法比對，請於服務時間洽本會人員。</p>
        </article>
      </section>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/config.js?v=20260626-ragic-case"></script>
  <script src="js/main.js?v=20260626-remove-news"></script>
  <script>
    (function () {
      var cfg = window.SITE_CONFIG || {};
      var r = cfg.ragic || {};
      var url = (r.url || "").trim();
      var banner = document.getElementById("modeBanner");
      var box = document.getElementById("ragicEmbed");

      if (url) {
        banner.className = "search-status is-live";
        banner.innerHTML =
          '<span aria-hidden="true"></span><strong>資料庫已連線</strong>';

        /* 設定 Ragic 嵌入所需的全域變數（等同官方嵌入碼） */
        window.ragic_url        = url;
        window.ragic_feature    = r.feature || "query";
        window.ragic_embedtype  = "";
        window.exactMatch       = (r.exactMatch !== false);
        window.pfv              = [];
        window.applyDefaultView = false;
        window.showSheetName    = (r.showSheetName !== false);

        /* 載入 Ragic 嵌入腳本（依 url 自動取得伺服器主機，如 ap16.ragic.com） */
        var host = url.split("/")[0];
        var rq = document.createElement("script");
        rq.type = "text/javascript";
        rq.async = true;
        rq.src = "https://" + host + "/intl/common/load.js";
        (document.getElementsByTagName("head")[0] || document.body).appendChild(rq);
      } else {
        banner.className = "search-status is-paused";
        banner.innerHTML =
          '<span aria-hidden="true"></span><strong>查詢服務設定中</strong>';
        box.classList.remove("ragic-embed");
        box.innerHTML =
          '<div class="state-box" style="text-align:left;padding:32px 28px">' +
          '<h3 style="text-align:center">查詢服務設定中</h3>' +
          '<p style="color:var(--text-soft);font-size:14.5px;line-height:2;max-width:680px;margin:14px auto 0;text-align:center">' +
          '線上查詢服務尚未開放。如需查詢案件相關資訊，請於服務時間聯絡本會。</p></div>';
      }
    })();
  </script>
</body>
</html>
