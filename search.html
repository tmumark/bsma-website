<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>案件查詢｜建築物安全管理協會</title>
  <meta name="description" content="建築物安全管理協會建築物公共安全檢查申報案件查詢服務。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" /></noscript>
  <link rel="icon" href="favicon.ico?v=20260624-logo" sizes="any" />
  <link rel="icon" type="image/png" href="assets/favicon.png?v=20260624-logo" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=20260624-logo" />
  <link rel="stylesheet" href="css/style.css?v=20260626-cover2" />
</head>
<body data-page="search">
  <div id="site-header"></div>

  <section class="page-banner">
    <div class="container">
      <div class="crumb"><a href="./">首頁</a> ／ 案件查詢</div>
      <h1>案件查詢</h1>
    </div>
  </section>

  <main class="section">
    <div class="container">
      <div id="modeBanner" class="notice info"></div>

      <!-- 查詢嵌入區 -->
      <div class="ragic-embed" id="ragicEmbed">
        <div id="ragic_webview"></div>
      </div>

      <div class="card" style="margin-top:28px;background:var(--blue-lighter)">
        <h3 style="margin-top:0;color:var(--navy);font-size:17px">查詢說明</h3>
        <ul style="margin:0;color:var(--text-soft);font-size:14.5px;padding-left:1.2em">
          <li>本頁提供案件相關查詢服務，資料由本會案件資料庫維護。</li>
          <li>請輸入<strong>完整的案件識別資料</strong>或本會指定查詢欄位，以保障案件當事人個資。</li>
          <li>查詢結果之「目前進度」與「審查結果」以本會實際審查紀錄與資料更新時間為準。</li>
          <li>如查詢畫面未顯示，請稍後再試，或於服務時間洽本會服務人員。</li>
        </ul>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/config.js?v=20260624-contact"></script>
  <script src="js/main.js?v=20260624-logo"></script>
  <script>
    (function () {
      var cfg = window.SITE_CONFIG || {};
      var r = cfg.ragic || {};
      var url = (r.url || "").trim();
      var banner = document.getElementById("modeBanner");
      var box = document.getElementById("ragicEmbed");

      if (url) {
        banner.className = "notice info";
        banner.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01" stroke-linecap="round"/></svg>' +
          '<div>本查詢介面由本會案件資料庫提供。</div>';

        /* 設定 Ragic 嵌入所需的全域變數（等同官方嵌入碼） */
        window.ragic_url        = url;
        window.ragic_feature    = r.feature || "query";
        window.ragic_embedtype  = "";
        window.exactMatch       = (r.exactMatch !== false);
        window.pfv              = [];
        window.applyDefaultView = false;
        window.showSheetName    = (r.showSheetName !== false);

        /* 載入 Ragic 嵌入腳本（依 url 自動取得伺服器主機，如 ap16.ragic.com） */
        var host = url.split("/")[0];
        var rq = document.createElement("script");
        rq.type = "text/javascript";
        rq.async = true;
        rq.src = "https://" + host + "/intl/common/load.js";
        (document.getElementsByTagName("head")[0] || document.body).appendChild(rq);
      } else {
        banner.className = "notice demo";
        banner.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>' +
          '<div><strong>查詢服務設定中：</strong>目前尚未開放線上查詢，請於服務時間洽本會服務人員。</div>';
        box.classList.remove("ragic-embed");
        box.innerHTML =
          '<div class="state-box" style="text-align:left;padding:32px 28px">' +
          '<h3 style="text-align:center">查詢服務設定中</h3>' +
          '<p style="color:var(--text-soft);font-size:14.5px;line-height:2;max-width:680px;margin:14px auto 0;text-align:center">' +
          '線上查詢服務尚未開放。如需查詢案件相關資訊，請於服務時間聯絡本會。</p></div>';
      }
    })();
  </script>
</body>
</html>
